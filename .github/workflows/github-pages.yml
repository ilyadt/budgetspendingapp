name: Build Vue project

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure env vars
        run: |
          echo "GITHUB_SHA_SHORT=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 📥 Install dependencies
        run: npm install

      - name: Unit Tests
        run: npm run test

      - name: ESlint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ steps.setupPages.outputs.base_path }}
          VITE_SERVER_URL: https://budgetd.duckdns.org
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_BUILD_COMMIT: ${{ env.GITHUB_SHA_SHORT }}

      - name: 📂 List build output
        run: ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ./dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment Notify Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deployed sha:${{github.sha}}
